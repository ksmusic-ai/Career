<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 시대 커리어 나침반</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --surface: #0d1117;
    --card: #111827;
    --border: #1f2937;
    --accent1: #00f5c4;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #f0f4ff;
    --muted: #6b7280;
    --glow: rgba(0, 245, 196, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 0.8s ease;
  }

  .header .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .header .eyebrow::before,
  .header .eyebrow::after {
    content: '';
    width: 40px;
    height: 1px;
    background: var(--accent1);
    opacity: 0.5;
  }

  h1 {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 30%, var(--accent1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    max-width: 500px;
    margin: 0 auto;
  }

  /* Progress */
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 48px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent1));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 12px var(--accent1);
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    margin-bottom: 32px;
    animation: fadeIn 0.5s ease;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--accent2), var(--accent1));
  }

  .question-num {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .question-text {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: clamp(17px, 3vw, 22px);
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 32px;
    color: #e2e8f0;
  }

  .question-icon {
    font-size: 32px;
    margin-bottom: 16px;
    display: block;
  }

  /* Options */
  .options {
    display: grid;
    gap: 12px;
  }

  .option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 24px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.6;
    position: relative;
    overflow: hidden;
  }

  .option:hover {
    border-color: var(--accent1);
    background: rgba(0, 245, 196, 0.05);
    transform: translateY(-1px);
  }

  .option.selected {
    border-color: var(--accent1);
    background: rgba(0, 245, 196, 0.1);
    box-shadow: 0 0 0 1px var(--accent1), 0 4px 20px rgba(0, 245, 196, 0.1);
  }

  .option-letter {
    min-width: 28px;
    height: 28px;
    background: var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.25s;
  }

  .option.selected .option-letter {
    background: var(--accent1);
    color: #000;
  }

  .option-text { flex: 1; }
  .option-label { font-weight: 500; margin-bottom: 2px; }
  .option-desc { font-size: 12px; color: var(--muted); }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
  }

  .btn {
    padding: 14px 32px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.25s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), #4f46e5);
    color: white;
    flex: 1;
    max-width: 240px;
    box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 14px 24px;
  }

  .btn-secondary:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  /* Result */
  .result-screen {
    display: none;
    animation: fadeIn 0.7s ease;
  }

  .result-screen.visible { display: block; }

  .result-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .result-type-badge {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .result-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .result-subtitle {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    max-width: 520px;
    margin: 0 auto;
  }

  /* Trait bars */
  .traits-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
  }

  .traits-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent1);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .trait-row {
    margin-bottom: 16px;
  }

  .trait-head {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 6px;
  }

  .trait-name { color: #cbd5e1; }
  .trait-val { color: var(--accent1); font-weight: 700; }

  .trait-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .trait-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Job cards */
  .section-label {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent1);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .jobs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .job-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: all 0.3s ease;
    cursor: default;
    animation: fadeUp 0.5s ease both;
  }

  .job-card:nth-child(1) { animation-delay: 0.1s; }
  .job-card:nth-child(2) { animation-delay: 0.2s; }
  .job-card:nth-child(3) { animation-delay: 0.3s; }
  .job-card:nth-child(4) { animation-delay: 0.4s; }

  .job-card:hover {
    border-color: var(--accent1);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0, 245, 196, 0.1);
  }

  .job-icon { font-size: 28px; margin-bottom: 12px; }

  .job-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #e2e8f0;
  }

  .job-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .job-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .tag-green { background: rgba(0,245,196,0.1); color: var(--accent1); }
  .tag-purple { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .tag-amber { background: rgba(245,158,11,0.1); color: var(--accent3); }

  /* Advice card */
  .advice-card {
    background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(0,245,196,0.05));
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
  }

  .advice-list {
    list-style: none;
    display: grid;
    gap: 14px;
  }

  .advice-list li {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    font-size: 14px;
    line-height: 1.6;
    color: #cbd5e1;
  }

  .advice-num {
    min-width: 24px;
    height: 24px;
    background: var(--accent2);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: white;
    margin-top: 1px;
  }

  /* AI risk indicator */
  .risk-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
  }

  .risk-meter {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 20px;
  }

  .risk-track {
    flex: 1;
    height: 10px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
  }

  .risk-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
  }

  .risk-label {
    font-size: 12px;
    font-weight: 700;
    min-width: 60px;
    text-align: right;
  }

  /* Share section */
  .share-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    margin-bottom: 16px;
  }

  .share-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent1);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .share-desc {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .share-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  .share-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.25s;
    text-decoration: none;
  }

  .share-btn-kakao {
    background: #FEE500;
    color: #3A1D1D;
  }
  .share-btn-kakao:hover { background: #f0d800; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(254,229,0,0.3); }

  .share-btn-twitter {
    background: #000;
    color: #fff;
    border: 1px solid #333;
  }
  .share-btn-twitter:hover { background: #111; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }

  .share-btn-facebook {
    background: #1877F2;
    color: #fff;
  }
  .share-btn-facebook:hover { background: #166fe5; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(24,119,242,0.3); }

  .share-btn-copy {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .share-btn-copy:hover { border-color: var(--accent1); color: var(--accent1); transform: translateY(-2px); }

  .copy-url-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .copy-url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    font-family: monospace;
    outline: none;
    cursor: text;
  }

  .copy-url-btn {
    background: var(--accent2);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: 'Gmarket Sans', sans-serif;
  }
  .copy-url-btn:hover { background: #6d28d9; }
  .copy-url-btn.copied { background: #059669; }

  .share-notice {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 8px;
    font-size: 11px;
    color: #d97706;
    line-height: 1.6;
  }

  /* Restart */
  .restart-btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 14px;
    transition: all 0.25s;
    margin-top: 8px;
  }

  .restart-btn:hover {
    border-color: var(--accent1);
    color: var(--accent1);
  }

  /* Intro */
  .intro-screen { animation: fadeIn 0.6s ease; }

  .intro-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    margin-bottom: 32px;
  }

  .intro-icon {
    font-size: 64px;
    display: block;
    margin-bottom: 24px;
    animation: float 3s ease-in-out infinite;
  }

  .intro-card h2 {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 22px;
    margin-bottom: 16px;
    color: #e2e8f0;
  }

  .intro-card p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
    max-width: 480px;
    margin: 0 auto 24px;
  }

  .features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
    text-align: center;
  }

  .feature {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
  }

  .feature-icon { font-size: 24px; margin-bottom: 8px; }
  .feature-label { font-size: 12px; color: var(--muted); line-height: 1.5; }

  .start-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--accent1), #00c49a);
    color: #000;
    border: none;
    padding: 18px 48px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    transition: all 0.3s ease;
    box-shadow: 0 8px 30px rgba(0, 245, 196, 0.3);
  }

  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 40px rgba(0, 245, 196, 0.4);
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @media (max-width: 600px) {
    .features { grid-template-columns: 1fr; }
    .jobs-grid { grid-template-columns: 1fr; }
    .question-card { padding: 24px; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="eyebrow">AI Career Compass</div>
    <h1>AI 시대 커리어<br>나침반</h1>
    <p class="subtitle">당신의 성향을 분석해 AI 시대에 최적화된 직업과 성장 방향을 제시합니다</p>
  </header>

  <!-- Intro -->
  <div class="intro-screen" id="introScreen">
    <div class="intro-card">
      <span class="intro-icon">🧭</span>
      <h2>당신만을 위한 AI 시대 커리어 로드맵</h2>
      <p>12개의 질문으로 당신의 성향, 강점, 사고 방식을 분석합니다.<br>AI와 공존하는 미래에서 빛날 수 있는 직업과 방향을 찾아드립니다.</p>
    </div>
    <div class="features">
      <div class="feature">
        <div class="feature-icon">🔍</div>
        <div class="feature-label">성향 심층 분석</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🚀</div>
        <div class="feature-label">AI 시대 최적 직업 추천</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🗺️</div>
        <div class="feature-label">맞춤 성장 전략</div>
      </div>
    </div>
    <div style="text-align:center">
      <button class="start-btn" onclick="startQuiz()">
        <span>시작하기</span><span>→</span>
      </button>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quizScreen" style="display:none">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label">
      <span id="progressText">1 / 12</span>
      <span id="progressPct">0%</span>
    </div>

    <div class="question-card" id="questionCard">
      <div class="question-num" id="qNum">Q01</div>
      <span class="question-icon" id="qIcon"></span>
      <div class="question-text" id="qText"></div>
      <div class="options" id="optionsContainer"></div>
    </div>

    <div class="nav">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQ()" style="display:none">← 이전</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" disabled>다음 →</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-screen" id="resultScreen"></div>

</div>

<script>
const questions = [
  {
    icon: "🧩",
    text: "복잡한 문제를 마주했을 때, 나는 주로 어떻게 접근하나요?",
    options: [

      { icon: "🏢", title: "Chief AI Officer (CAIO)", desc: "기업의 AI 전략 전체를 총괄하는 임원급 리더", tags: ["임원급", "신직종"] },

let current = 0;
let answers = [];
let scores = { analytical: 0, creative: 0, social: 0, leadership: 0, technical: 0 };

function startQuiz() {
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('qNum').textContent = 'Q' + String(current + 1).padStart(2, '0');
  document.getElementById('qIcon').textContent = q.icon;
  document.getElementById('qText').textContent = q.text;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `
      <div class="option-letter">${opt.letter}</div>
      <div class="option-text">
        <div class="option-label">${opt.label}</div>
        <div class="option-desc">${opt.desc}</div>
      </div>`;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });

  document.getElementById('prevBtn').style.display = current > 0 ? 'block' : 'none';
  document.getElementById('nextBtn').disabled = answers[current] === undefined;
  document.getElementById('nextBtn').textContent = current === questions.length - 1 ? '결과 보기 🎯' : '다음 →';

  // animate
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeIn 0.4s ease';
}

function selectOption(idx) {
  answers[current] = idx;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('nextBtn').disabled = false;
}

function nextQ() {
  if (answers[current] === undefined) return;
  const q = questions[current];
  const sel = q.options[answers[current]];
  Object.keys(sel.scores).forEach(k => { scores[k] += sel.scores[k]; });

  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (current > 0) {
    // undo last score
    const q = questions[current];
    if (answers[current] !== undefined) {
      const sel = q.options[answers[current]];
      Object.keys(sel.scores).forEach(k => { scores[k] -= sel.scores[k]; });
    }
    current--;
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  const result = document.getElementById('resultScreen');
  result.classList.add('visible');

  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const profile = careerProfiles[top];

  const tagColors = ['tag-green', 'tag-purple', 'tag-amber'];

  const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
  const traits = [
    { name: '분석·논리', key: 'analytical', color: '#60a5fa' },
    { name: '창의·혁신', key: 'creative', color: '#f59e0b' },
    { name: '공감·소통', key: 'social', color: '#00f5c4' },
    { name: '리더십·실행', key: 'leadership', color: '#f87171' },
    { name: '기술·구현', key: 'technical', color: '#a78bfa' }
  ];

  result.innerHTML = `
    <div class="result-header">
      <div class="result-type-badge" style="background:${profile.badge.bg}; color:${profile.badge.color}">
        ${profile.badge.text}
      </div>
      <div class="result-title">${profile.emoji} ${profile.type}</div>
      <p class="result-subtitle">${profile.summary}</p>
    </div>

    <div class="traits-card">
      <div class="traits-title">성향 분석 레이더</div>
      ${traits.map(t => {
        const pct = Math.min(100, Math.round((scores[t.key] / (totalScore || 1)) * 100 * 2.2));
        return `
        <div class="trait-row">
          <div class="trait-head">
            <span class="trait-name">${t.name}</span>
            <span class="trait-val">${pct}%</span>
          </div>
          <div class="trait-bar-bg">
            <div class="trait-bar-fill" id="bar_${t.key}" style="width:0%;background:${t.color}"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-label">🎯 추천 직업 & 역할</div>
    <div class="jobs-grid">
      ${profile.jobs.map(j => `
        <div class="job-card">
          <div class="job-icon">${j.icon}</div>
          <div class="job-title">${j.title}</div>
          <div class="job-desc">${j.desc}</div>
          <div class="job-tags">
            ${j.tags.map((t, i) => `<span class="tag ${tagColors[i % 3]}">${t}</span>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>

    <div class="advice-card">
      <div class="section-label" style="margin-bottom:20px">🗺️ 성장 전략 로드맵</div>
      <ul class="advice-list">
        ${profile.advice.map((a, i) => `
          <li>
            <div class="advice-num">${i + 1}</div>
            <span>${a}</span>
          </li>
        `).join('')}
      </ul>
    </div>

    <div class="risk-card">
      <div class="section-label" style="margin-bottom:8px">⚡ AI 대체 위험도 진단</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">
        당신의 성향과 강점은 AI가 대체하기 어려운 영역에 집중되어 있습니다.
      </p>
      <div style="font-size:13px;margin-bottom:8px;color:#cbd5e1">AI 대체 가능성</div>
      <div class="risk-meter">
        <div class="risk-track">
          <div class="risk-fill" id="riskFill" style="width:0%;background:${profile.riskColor}"></div>
        </div>
        <div class="risk-label" style="color:${profile.riskColor}">${profile.aiRisk}%</div>
      </div>
      <p style="font-size:11px;color:var(--muted);margin-top:12px">
        * McKinsey·Oxford 연구 기반, 성향별 추정 수치입니다
      </p>
    </div>

    <div class="share-section">
      <div class="share-title">📤 결과 공유하기</div>
      <div class="share-desc">친구에게 테스트를 추천하고 결과를 함께 비교해보세요!</div>
      <div class="share-buttons">
        <button class="share-btn share-btn-kakao" onclick="shareKakao('${profile.type}', '${profile.emoji}')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.65 5.07 4.15 6.52L5.1 21l4.85-2.6c.67.1 1.35.15 2.05.15 5.523 0 10-3.477 10-7.8S17.523 3 12 3z"/></svg>
          카카오톡 공유
        </button>
        <button class="share-btn share-btn-twitter" onclick="shareTwitter('${profile.type}', '${profile.emoji}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          X (트위터)
        </button>
        <button class="share-btn share-btn-facebook" onclick="shareFacebook()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          페이스북
        </button>
        <button class="share-btn share-btn-copy" onclick="copyLink()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          링크 복사
        </button>
      </div>
      <div class="copy-url-row">
        <input class="copy-url-input" id="urlInput" type="text" value="${window.location.href}" readonly onclick="this.select()"/>
        <button class="copy-url-btn" id="copyUrlBtn" onclick="copyUrl()">복사</button>
      </div>
      <div class="share-notice">
        💡 <strong>Netlify로 배포하면</strong> 누구나 이 URL로 접속할 수 있습니다. HTML 파일을 netlify.com에 드래그앤드롭하면 30초 만에 공유 링크가 생성됩니다.
      </div>
    </div>

    <button class="restart-btn" onclick="restartQuiz()">↩ 처음부터 다시 하기</button>
  `;

  // animate bars after render
  setTimeout(() => {
    traits.forEach(t => {
      const pct = Math.min(100, Math.round((scores[t.key] / (totalScore || 1)) * 100 * 2.2));
      const el = document.getElementById('bar_' + t.key);
      if (el) el.style.width = pct + '%';
    });
    const rf = document.getElementById('riskFill');
    if (rf) rf.style.width = profile.aiRisk + '%';
  }, 100);
}

function restartQuiz() {
  current = 0;
  answers = [];
  scores = { analytical: 0, creative: 0, social: 0, leadership: 0, technical: 0 };
  document.getElementById('resultScreen').classList.remove('visible');
  document.getElementById('resultScreen').innerHTML = '';
  document.getElementById('introScreen').style.display = 'block';
}

function shareKakao(type, emoji) {
  const url = window.location.href;
  const text = `나의 AI 시대 커리어 유형은 "${emoji} ${type}"입니다!\n나만의 AI 시대 직업을 찾아보세요 👇`;
  // 카카오 SDK가 없으면 카카오 공유 앱 딥링크로 fallback
  const kakaoUrl = `https://sharer.kakao.com/talk/friends/picker/link?app_key=DEMO&link_ver=4.0&template_object=${encodeURIComponent(JSON.stringify({
    object_type: 'feed',
    content: {
      title: `🧭 AI 시대 커리어 나침반`,
      description: text,
      link: { web_url: url, mobile_web_url: url }
    }
  }))}`;

  // 모바일에서는 카카오톡 앱 공유, PC에서는 웹 공유
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  if (isMobile) {
    window.location.href = `kakaolink://send?text=${encodeURIComponent(text + '\n' + url)}`;
    setTimeout(() => {
      // 앱이 없으면 URL 복사
      copyToClipboard(`${text}\n${url}`, '카카오톡에 붙여넣기할 내용이 복사되었습니다! 📋');
    }, 1000);
  } else {
    copyToClipboard(`${text}\n${url}`, '카카오톡에 붙여넣기할 내용이 복사되었습니다! 카카오톡을 열고 채팅창에 붙여넣기 하세요 📋');
  }
}

function shareTwitter(type, emoji) {
  const url = window.location.href;
  const text = `나의 AI 시대 커리어 유형은 "${emoji} ${type}"!\nAI 시대에 나에게 맞는 직업을 찾아보세요 🧭`;
  const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
  window.open(twitterUrl, '_blank', 'width=600,height=400');
}

function shareFacebook() {
  const url = window.location.href;
  const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
  window.open(fbUrl, '_blank', 'width=600,height=400');
}

function copyLink() {
  copyToClipboard(window.location.href, '링크가 복사되었습니다! 카카오톡, 문자 등 어디서나 붙여넣기 하세요 ✅');
}

function copyUrl() {
  const btn = document.getElementById('copyUrlBtn');
  copyToClipboard(window.location.href, null);
  btn.textContent = '✓ 복사됨';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = '복사';
    btn.classList.remove('copied');
  }, 2000);
}

function copyToClipboard(text, message) {
  navigator.clipboard.writeText(text).then(() => {
    if (message) showToast(message);
  }).catch(() => {
    // fallback
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    if (message) showToast(message);
  });
}

function showToast(msg) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.textContent = msg;
  toast.style.cssText = `
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1f2937; color: #f0f4ff; padding: 14px 24px;
    border-radius: 12px; font-size: 13px; z-index: 9999;
    border: 1px solid #374151; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-width: 90vw; text-align: center; line-height: 1.5;
    animation: fadeIn 0.3s ease;
  `;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; }, 3000);
  setTimeout(() => toast.remove(), 3300);
}
</script>
